<body class="bg-slate-50 min-h-screen text-slate-800 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, BarChart, Bar, ComposedChart, Area } = window.Recharts;

        const Icons = {
            TrendingUp: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Award: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>,
            Briefcase: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            AlertTriangle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>,
            PlusCircle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Clock: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Trash2: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
            Users: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            UserPlus: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>,
            ClipboardList: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>,
            Database: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>,
            CheckCircle2: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            HelpCircle: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Target: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></svg>
        };

        const DEFAULT_MEMBERS = ['小明', '雅婷', '志豪', '美玲', '小威'];

        const DEFAULT_ENTRIES = [
            { id: 1, name: '小明', week: '7月 W1 (07/01 - 07/05)', install: 3, nextInstall: 2, pending: 5, kpi: 4, cumulativeKpi: 3, support: '需要主管陪同二訪議價' },
            { id: 2, name: '雅婷', week: '7月 W1 (07/01 - 07/05)', install: 4, nextInstall: 5, pending: 3, kpi: 4, cumulativeKpi: 4, support: '無' },
            { id: 3, name: '志豪', week: '7月 W1 (07/01 - 07/05)', install: 2, nextInstall: 3, pending: 6, kpi: 4, cumulativeKpi: 2, support: '申請特案價格授權' },
            { id: 4, name: '美玲', week: '7月 W1 (07/01 - 07/05)', install: 5, nextInstall: 4, pending: 2, kpi: 4, cumulativeKpi: 5, support: '協調工程延後裝機' },
            { id: 10, name: '小威', week: '7月 W2 (07/06 - 07/12)', install: 1, nextInstall: 4, pending: 0, kpi: 4, cumulativeKpi: 3, support: '無' },
            { id: 5, name: '小明', week: '7月 W2 (07/06 - 07/12)', install: 4, nextInstall: 3, pending: 4, kpi: 4, cumulativeKpi: 7, support: '無' },
            { id: 6, name: '雅婷', week: '7月 W2 (07/06 - 07/12)', install: 5, nextInstall: 4, pending: 2, kpi: 4, cumulativeKpi: 9, support: '無' },
            { id: 7, name: '志豪', week: '7月 W2 (07/06 - 07/12)', install: 3, nextInstall: 4, pending: 5, kpi: 4, cumulativeKpi: 5, support: '需要工程支援廚房連線問題' },
            { id: 8, name: '美玲', week: '7月 W2 (07/06 - 07/12)', install: 4, nextInstall: 5, pending: 3, kpi: 4, cumulativeKpi: 9, support: '無' },
            
            // 6月歷史補登示範數據（精確隔離計算測試）
            { id: 11, name: '小威', week: '6月 W1 (06/01 - 06/07)', install: 3, nextInstall: 2, pending: 2, kpi: 4, cumulativeKpi: 3, support: '無' },
            { id: 12, name: '小威', week: '6月 W2 (06/08 - 06/14)', install: 1, nextInstall: 3, pending: 1, kpi: 4, cumulativeKpi: 4, support: '無' },
            { id: 13, name: '小威', week: '6月 W3 (06/15 - 06/21)', install: 4, nextInstall: 3, pending: 0, kpi: 4, cumulativeKpi: 8, support: '無' },
            { id: 14, name: '小威', week: '6月 W4 (06/22 - 06/28)', install: 3, nextInstall: 2, pending: 1, kpi: 4, cumulativeKpi: 11, support: '無' },
            { id: 15, name: '小威', week: '6月 W5 (06/29 - 06/30)', install: 2, nextInstall: 0, pending: 0, kpi: 5, cumulativeKpi: 13, support: '無' }
        ];

        // 智慧計算對應月份的每週日期區間
        const getWeeksForMonth2026 = (monthStr) => {
            const m = parseInt(monthStr, 10);
            if (isNaN(m)) return [];
            const year = 2026;
            
            const firstDay = new Date(year, m - 1, 1);
            const lastDay = new Date(year, m, 0);
            const totalDays = lastDay.getDate();
            
            let weeks = [];
            let currentStart = 1;
            let weekNum = 1;
            
            let firstDayOfWeek = firstDay.getDay(); 
            let firstDayAdjusted = firstDayOfWeek === 0 ? 7 : firstDayOfWeek;
            
            let daysInFirstWeek = 8 - firstDayAdjusted;
            let firstWeekEnd = Math.min(daysInFirstWeek, totalDays);
            
            const formatDay = (day) => String(day).padStart(2, '0');
            const formatMonth = (month) => String(month).padStart(2, '0');
            
            weeks.push({
                id: `W${weekNum}`,
                label: `W1 (${formatMonth(m)}/${formatDay(currentStart)} - ${formatMonth(m)}/${formatDay(firstWeekEnd)})`
            });
            
            currentStart = firstWeekEnd + 1;
            weekNum++;
            
            while (currentStart <= totalDays) {
                let currentEnd = Math.min(currentStart + 6, totalDays);
                weeks.push({
                    id: `W${weekNum}`,
                    label: `W${weekNum} (${formatMonth(m)}/${formatDay(currentStart)} - ${formatMonth(m)}/${formatDay(currentEnd)})`
                });
                currentStart = currentEnd + 1;
                weekNum++;
            }
            return weeks;
        };

        const getMonthFromWeek = (weekStr) => {
            const match = weekStr.match(/^(\d+月)/);
            return match ? match[1] : '其他';
        };

        const getWeekIndex = (weekStr) => {
            const match = weekStr.match(/W(\d+)/);
            return match ? parseInt(match[1], 10) : 999;
        };

        const App = () => {
            const [entries, setEntries] = useState(() => {
                const saved = localStorage.getItem('pos_entries_v10');
                return saved ? JSON.parse(saved) : DEFAULT_ENTRIES;
            });

            const [members, setMembers] = useState(() => {
                const saved = localStorage.getItem('pos_members_v10');
                return saved ? JSON.parse(saved) : DEFAULT_MEMBERS;
            });

            const [selectedMonthFilter, setSelectedMonthFilter] = useState('7月');
            const [selectedMemberFilter, setSelectedMemberFilter] = useState('All');
            const [tableMode, setTableMode] = useState('detail'); // 'detail' | 'summary'

            const [monthlyTargets, setMonthlyTargets] = useState(() => {
                const saved = localStorage.getItem('pos_monthly_targets_v3');
                return saved ? JSON.parse(saved) : { 
                    '7月': 30, '6月': 20, '5月': 25, '4月': 25, '3月': 20, '2月': 20, '1月': 20, 'All': 100 
                };
            });
            const [isEditingTarget, setIsEditingTarget] = useState(false);
            const [targetInput, setTargetInput] = useState('');

            const [isCloudMode, setIsCloudMode] = useState(() => {
                return localStorage.getItem('pos_cloud_mode') === 'true';
            });
            const [firebaseUrl, setFirebaseUrl] = useState(() => {
                return localStorage.getItem('pos_firebase_url') || '';
            });
            const [groupKey, setGroupKey] = useState(() => {
                return localStorage.getItem('pos_group_key') || 'sales_team_alpha';
            });
            const [lastSynced, setLastSynced] = useState(null);

            const [newMemberName, setNewMemberName] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [selectedMonth, setSelectedMonth] = useState('7月');
            const [selectedWeek, setSelectedWeek] = useState('W1');
            const [isCustomWeek, setIsCustomWeek] = useState(false);
            const [customWeekText, setCustomWeekText] = useState('');

            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
            const [showResetConfirm, setShowResetConfirm] = useState(false);

            const [formData, setFormData] = useState({
                name: '小明',
                install: '',
                nextInstall: '',
                pending: '',
                kpi: '4',
                cumulativeKpi: '',
                support: ''
            });

            const weekOptions = useMemo(() => {
                return getWeeksForMonth2026(selectedMonth);
            }, [selectedMonth]);

            useEffect(() => {
                if (weekOptions.length > 0) {
                    const exists = weekOptions.some(w => w.id === selectedWeek);
                    if (!exists) {
                        setSelectedWeek(weekOptions[0].id);
                    }
                }
            }, [selectedMonth, weekOptions, selectedWeek]);

            useEffect(() => {
                localStorage.setItem('pos_cloud_mode', isCloudMode);
                localStorage.setItem('pos_firebase_url', firebaseUrl);
                localStorage.setItem('pos_group_key', groupKey);
            }, [isCloudMode, firebaseUrl, groupKey]);

            useEffect(() => {
                if (!isCloudMode) {
                    localStorage.setItem('pos_entries_v10', JSON.stringify(entries));
                }
            }, [entries, isCloudMode]);

            useEffect(() => {
                if (!isCloudMode) {
                    localStorage.setItem('pos_members_v10', JSON.stringify(members));
                }
            }, [members, isCloudMode]);

            useEffect(() => {
                localStorage.setItem('pos_monthly_targets_v3', JSON.stringify(monthlyTargets));
            }, [monthlyTargets]);

            const syncFromCloud = async () => {
                if (!isCloudMode || !firebaseUrl) return;
                try {
                    const cleanUrl = firebaseUrl.replace(/\/$/, "");
                    const res = await fetch(`${cleanUrl}/pos_weekly/${groupKey}.json`);
                    if (!res.ok) throw new Error('連線失敗');
                    const data = await res.json();
                    
                    if (data) {
                        if (data.entries) {
                            const sortedEntries = Object.values(data.entries).sort((a, b) => b.id - a.id);
                            setEntries(sortedEntries);
                        } else {
                            setEntries([]);
                        }
                        if (data.members) {
                            setMembers(Object.values(data.members));
                        }
                        if (data.monthlyTargets) {
                            setMonthlyTargets(data.monthlyTargets);
                        }
                    } else {
                        await syncToCloud(entries, members, monthlyTargets);
                    }
                    setLastSynced(new Date().toLocaleTimeString());
                } catch (err) {
                    console.error(err);
                }
            };

            const syncToCloud = async (updatedEntries, updatedMembers, updatedTargets) => {
                if (!isCloudMode || !firebaseUrl) return;
                try {
                    const cleanUrl = firebaseUrl.replace(/\/$/, "");
                    await fetch(`${cleanUrl}/pos_weekly/${groupKey}/entries.json`, {
                        method: 'PUT',
                        body: JSON.stringify(updatedEntries)
                    });
                    await fetch(`${cleanUrl}/pos_weekly/${groupKey}/members.json`, {
                        method: 'PUT',
                        body: JSON.stringify(updatedMembers)
                    });
                    await fetch(`${cleanUrl}/pos_weekly/${groupKey}/monthlyTargets.json`, {
                        method: 'PUT',
                        body: JSON.stringify(updatedTargets)
                    });
                    setLastSynced(new Date().toLocaleTimeString());
                } catch (err) {
                    console.error(err);
                }
            };

            useEffect(() => {
                if (isCloudMode && firebaseUrl) {
                    syncFromCloud();
                    const interval = setInterval(syncFromCloud, 8000);
                    return () => clearInterval(interval);
                }
            }, [isCloudMode, firebaseUrl, groupKey]);

            const triggerToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast({ show: false, message: '', type: 'success' });
                }, 4000);
            };

            const computedEntries = useMemo(() => {
                const groups = {};
                entries.forEach(e => {
                    const month = getMonthFromWeek(e.week);
                    const key = `${e.name}_${month}`;
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(e);
                });

                const computedMap = new Map();
                
                Object.keys(groups).forEach(key => {
                    const groupEntries = [...groups[key]];
                    groupEntries.sort((a, b) => getWeekIndex(a.week) - getWeekIndex(b.week));

                    let monthlyCumulativeInstalls = 0;
                    groupEntries.forEach(e => {
                        monthlyCumulativeInstalls += (e.install || 0);
                        // 修正：成交量完全等同於實際裝機之歷史累加，不提前灌水
                        computedMap.set(e.id, monthlyCumulativeInstalls);
                    });
                });

                return entries.map(e => ({
                    ...e,
                    totalDeals: computedMap.get(e.id) || (e.install || 0)
                }));
            }, [entries]);

            const summaryMetricsByMonth = useMemo(() => {
                const monthlyEntries = computedEntries.filter(e => {
                    if (selectedMonthFilter === 'All') return true;
                    return getMonthFromWeek(e.week) === selectedMonthFilter;
                });

                // 累計裝機 = 該時間段裝機加總
                const totalInstalls = monthlyEntries.reduce((acc, curr) => acc + (curr.install || 0), 0);
                const totalDeals = totalInstalls; 

                // 水庫Pending：抓取各組員在選定區間中，最新一期申報的pending
                const latestPendingByMember = {};
                monthlyEntries.forEach(e => {
                    const weekIdx = getWeekIndex(e.week);
                    if (!latestPendingByMember[e.name] || latestPendingByMember[e.name].weekIdx < weekIdx) {
                        latestPendingByMember[e.name] = {
                            weekIdx,
                            pending: e.pending || 0
                        };
                    }
                });
                const totalPending = Object.values(latestPendingByMember).reduce((acc, curr) => acc + curr.pending, 0);
                const activeSupports = monthlyEntries.filter(e => e.support && e.support !== '無').length;

                return { totalInstalls, totalDeals, totalPending, activeSupports };
            }, [computedEntries, selectedMonthFilter]);

            const currentTarget = useMemo(() => {
                return monthlyTargets[selectedMonthFilter] || 20;
            }, [monthlyTargets, selectedMonthFilter]);

            const currentDeals = summaryMetricsByMonth.totalDeals;
            const achievementRate = currentTarget > 0 ? Math.round((currentDeals / currentTarget) * 100) : 0;

            const handleSaveTarget = async () => {
                const targetValue = parseInt(targetInput, 10);
                if (isNaN(targetValue) || targetValue < 0) {
                    triggerToast('請輸入正確的目標間數！', 'error');
                    return;
                }
                const nextTargets = {
                    ...monthlyTargets,
                    [selectedMonthFilter]: targetValue
                };
                setMonthlyTargets(nextTargets);
                setIsEditingTarget(false);
                triggerToast(`已成功修改 ${selectedMonthFilter} 團隊目標為 ${targetValue} 間！`);

                if (isCloudMode) {
                    await syncToCloud(entries, members, nextTargets);
                }
            };

            const handleStartEditTarget = () => {
                setTargetInput(currentTarget.toString());
                setIsEditingTarget(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.name) {
                    triggerToast('請選擇或填寫業務姓名！', 'error');
                    return;
                }

                let finalWeek = '';
                if (isCustomWeek) {
                    finalWeek = customWeekText.trim() || '未填日期';
                } else {
                    const activeWeekObj = weekOptions.find(w => w.id === selectedWeek);
                    const weekLabel = activeWeekObj ? activeWeekObj.label : selectedWeek;
                    finalWeek = `${selectedMonth} ${weekLabel}`;
                }

                const newEntry = {
                    id: Date.now(),
                    name: formData.name,
                    week: finalWeek,
                    install: parseInt(formData.install || 0, 10),
                    nextInstall: parseInt(formData.nextInstall || 0, 10),
                    pending: parseInt(formData.pending || 0, 10),
                    kpi: parseInt(formData.kpi || 0, 10),
                    cumulativeKpi: parseInt(formData.cumulativeKpi || 0, 10),
                    support: formData.support || '無'
                };

                const nextEntries = [newEntry, ...entries];
                setEntries(nextEntries);
                triggerToast(`🎉 已成功送出 ${formData.name} 在 [${finalWeek}] 的數據！`);

                if (isCloudMode) {
                    await syncToCloud(nextEntries, members, monthlyTargets);
                }
                
                setFormData({
                    ...formData,
                    install: '',
                    nextInstall: '',
                    pending: '',
                    cumulativeKpi: '',
                    support: ''
                });
            };

            const handleAddMember = async (e) => {
                e.preventDefault();
                if (!newMemberName.trim()) return;
                if (members.includes(newMemberName.trim())) {
                    triggerToast('該組員已存在！', 'error');
                    return;
                }
                const nextMembers = [...members, newMemberName.trim()];
                setMembers(nextMembers);
                setFormData({ ...formData, name: newMemberName.trim() });
                setNewMemberName('');
                triggerToast(`新增組員 「${newMemberName}」 成功`);

                if (isCloudMode) {
                    await syncToCloud(entries, nextMembers, monthlyTargets);
                }
            };

            const handleDeleteMember = async (nameToDelete) => {
                const nextMembers = members.filter(m => m !== nameToDelete);
                setMembers(nextMembers);
                triggerToast(`已移除組員 「${nameToDelete}」`, 'warning');

                if (isCloudMode) {
                    await syncToCloud(entries, nextMembers, monthlyTargets);
                }
            };

            const handleDeleteEntry = async (id) => {
                const nextEntries = entries.filter(e => e.id !== id);
                setEntries(nextEntries);
                triggerToast('已刪除該筆歷史週報數據', 'warning');

                if (isCloudMode) {
                    await syncToCloud(nextEntries, members, monthlyTargets);
                }
            };

            const handleResetData = async () => {
                setEntries(DEFAULT_ENTRIES);
                setMembers(DEFAULT_MEMBERS);
                setMonthlyTargets({ '7月': 30, '6月': 20, '5月': 25, '4月': 25, 'All': 100 });
                setShowResetConfirm(false);
                triggerToast('數據已還原至預設範例！');

                if (isCloudMode) {

                    const parseWeek = (w) => {
                        const match = w.match(/(\d+)月\s+W(\d+)/);
                        if (match) {
                            return parseInt(match[1], 10) * 10 + parseInt(match[2], 10);
                        }
                        return 999;
                    };
                    return parseWeek(a) - parseWeek(b);
                });

                if (selectedMemberFilter === 'All') {
                    // 全隊模式下，建立每週各組員獨立裝機走勢對齊資料
                    return sortedWeeks.map(wk => {
                        const row = { week: wk };
                        members.forEach(m => {

                            row[m] = match ? (match.install || 0) : 0;
                        });
                        return row;

                            week: wk,
                            install: match ? (match.install || 0) : 0,
                            nextInstall: match ? (match.nextInstall || 0) : 0,
                            pending: match ? (match.pending || 0) : 0,
                            totalDeals: match ? (match.totalDeals || 0) : 0

                members.forEach(m => {

                        name: m,
                        '實際裝機': 0,
                        '當週KPI': 0,
                        '累計成交': 0
                    };
                });

                                                    <button
                                                        onClick={() => handleDeleteMember(member)}
                                                        className="p-1.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition"
                                                        title="自組員名單移除"
                                                    >
                                                        <Icons.Trash2 />
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 雲端資料庫設定 */}
                            {activeTab === 'cloudSettings' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/80">
                                        <h3 className="text-lg font-bold text-slate-900 mb-2 flex items-center gap-2">
                                            <Icons.Database /> 
                                            雲端實時協作設定
                                        </h3>
                                        <p className="text-xs text-slate-500 mb-6">
                                            將資料儲存位置從「本機瀏覽器」升級為「雲端資料庫」，實現組員隨時隨地填寫、數據即時自動彙總。
                                        </p>

                                        <div className="space-y-4">
                                            <div className="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                                                <div>
                                                    <span className="font-bold text-sm block">啟用雲端協作同步</span>
                                                    <span className="text-xs text-slate-400 block">開啟後，數據將即時讀取與儲存至您的 Firebase</span>
                                                </div>
                                                <button
                                                    onClick={() => setIsCloudMode(!isCloudMode)}
                                                    className={`w-14 h-8 rounded-full transition-colors relative focus:outline-none ${isCloudMode ? 'bg-indigo-600' : 'bg-slate-300'}`}
                                                >
                                                    <span className={`absolute top-1 left-1 w-6 h-6 rounded-full bg-white shadow-md transition-transform transform ${isCloudMode ? 'translate-x-6' : 'translate-x-0'}`} />
                                                </button>
                                            </div>

                                            {isCloudMode && (
                                                <div className="p-4 border border-indigo-100 bg-indigo-50/30 rounded-xl space-y-3">
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 mb-1">Firebase Realtime Database URL</label>
                                                        <input 
                                                            type="text" 
                                                            placeholder="https://your-project-default-rtdb.firebaseio.com"
                                                            className="w-full p-2 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                                                            value={firebaseUrl}
                                                            onChange={(e) => setFirebaseUrl(e.target.value)}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-xs font-bold text-slate-500 mb-1">小組代號 / Group Key</label>
                                                        <input 
                                                            type="text" 
                                                            className="w-full p-2 text-xs bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono"
                                                            value={groupKey}
                                                            onChange={(e) => setGroupKey(e.target.value)}
                                                        />
                                                    </div>
                                                    <button
                                                        onClick={() => {
                                                            syncFromCloud();
                                                            triggerToast('已成功連線並載入雲端數據！');
                                                        }}
                                                        className="w-full bg-slate-900 text-white py-2 rounded-lg text-xs font-semibold hover:bg-slate-800 transition"
                                                    >
                                                        立即手動連線同步雲端數據
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // 掛載並渲染網頁
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
